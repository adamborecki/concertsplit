<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>concertsplit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 2rem;
        color: #222;
        background: #fafafa;
      }
      h1 { margin: 0 0 0.25rem; }
      .subtle { color: #777; font-size: 0.9rem; }
      pre {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 1rem;
        overflow-x: auto;
      }
      .placeholder {
        margin-top: 2rem;
        padding: 1rem;
        border: 1px dashed #bbb;
        border-radius: 6px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>concertsplit</h1>
    <div class="subtle">Loaded project.json — waveform UI will live here.</div>
    <pre id="project">Loading…</pre>
    <div class="placeholder">
      Coming next: waveform display, segment marking, applause detection, encode button.
    </div>
    <script>
      fetch('/api/project')
        .then((r) => r.json())
        .then((data) => {
          document.getElementById('project').textContent = JSON.stringify(data, null, 2);
        })
        .catch((err) => {
          document.getElementById('project').textContent = 'Error: ' + err.message;
        });
    </script>
  </body>
</html>
